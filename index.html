<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celestial Essence - 至高の存在</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-background"></div>
  <div class="magic-pattern"></div>

  <div class="container">
    <!-- Header -->
    <header class="game-header">
      <h1>✨ Celestial Essence ✨</h1>
      <p class="subtitle">至高の存在</p>
    </header>

    <!-- Score Section -->
    <section class="score-section">
      <div class="score-display">
        <div class="score-label">スコア</div>
        <div class="score-value" id="current-score">00</div>
        <div class="score-target">/ 15</div>
      </div>
      <div class="score-bar-container">
        <div class="score-bar" id="score-bar"></div>
      </div>
      <div id="game-status"></div>
    </section>

    <!-- Main Game Area -->
    <div class="game-area">
      <!-- Left Column: Element Management -->
      <section class="element-section">
        <h2>🌍 属性</h2>

        <!-- Element Pool -->
        <div class="subsection">
          <h3>属性プール</h3>
          <div id="element-pool" class="element-grid"></div>
        </div>

        <!-- Player Elements -->
        <div class="subsection">
          <h3>所有属性</h3>
          <div id="player-elements" class="element-grid"></div>
        </div>

        <!-- Element Bonuses -->
        <div class="subsection">
          <h3>属性ボーナス</h3>
          <div id="element-bonuses" class="element-grid"></div>
        </div>

        <!-- Aether Display -->
        <div class="subsection">
          <h3>エーテル（源）</h3>
          <div class="aether-display">
            <span class="aether-icon">⭐</span>
            <span class="aether-count" id="aether-count">0</span>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-section">
          <h3>アクション</h3>

          <!-- Take Three Different -->
          <button class="action-button" id="take-three-btn" onclick="takeThreeDifferent()">
            異なる3つの属性を取得
          </button>

          <!-- Take Two Same -->
          <div class="two-same-container">
            <label for="two-same-select">同じ属性2つを取得:</label>
            <select id="two-same-select" class="element-select">
              <option value="">属性を選択</option>
              <option value="light">🕯️ ライト</option>
              <option value="aqua">💧 アクア</option>
              <option value="wind">🌪️ ウィンド</option>
              <option value="fire">🔥 ファイア</option>
              <option value="dark">⚫ ダーク</option>
            </select>
            <button class="action-button" onclick="takeTwoSame()">取得</button>
          </div>

          <!-- Game Control Buttons -->
          <button class="action-button secondary" onclick="autoPlay()">自動プレイ</button>
          <button class="action-button secondary" onclick="newGame()">新規ゲーム</button>
        </div>
      </section>

      <!-- Middle Column: Card Management -->
      <section class="card-section">
        <h2>🎴 魔法カード</h2>

        <!-- Tier Columns -->
        <div class="tier-grid">
          <div class="tier-column">
            <h3>初級</h3>
            <div id="tier1-column" class="card-column"></div>
          </div>
          <div class="tier-column">
            <h3>中級</h3>
            <div id="tier2-column" class="card-column"></div>
          </div>
          <div class="tier-column">
            <h3>上級</h3>
            <div id="tier3-column" class="card-column"></div>
          </div>
        </div>
      </section>

      <!-- Right Column: Purchased & Reserved Cards -->
      <section class="card-management-section">
        <!-- Purchased Cards -->
        <div class="subsection">
          <h2>📚 購入済みカード</h2>
          <div id="purchased-cards" class="card-list"></div>
        </div>

        <!-- Reserved Cards -->
        <div class="subsection">
          <h2>📜 予約済みカード</h2>
          <div id="reserved-cards" class="reserved-list"></div>
        </div>
      </section>
    </div>

    <!-- Game Log -->
    <section class="log-section">
      <h2>📋 ゲームログ</h2>
      <div id="game-log" class="game-log"></div>
    </section>
  </div>

  <!-- Scripts -->
  <script src="games-common.js"></script>
  <script src="constants.js"></script>
  <script src="script.js"></script>
</body>
</html>
